name: "CI/CD NodeJS Application"
on:
  push:
    branches: [main]
    paths-ignore:
      - "README.md"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy using SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/apps/my-node-app
            git pull origin main
            sudo COMPOSE_BAKE=false docker compose down
            sudo COMPOSE_BAKE=false docker compose build --no-cache
            sudo COMPOSE_BAKE=false docker compose up -d --force-recreate
            docker image prune -f
